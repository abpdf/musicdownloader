name: Build and Release Tauri App

on:
  push:
    tags:
      - 'v*'                 # 匹配 v1.0.0, v2.3.4 等
  workflow_dispatch:          # 手动触发

jobs:
  # ==========================
  # 多平台构建（矩阵策略）
  # ==========================
  build:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false        # 一个平台失败不影响其他平台
      matrix:
        include:
          # Windows (x64)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tauri-app-windows-x64

          # macOS (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: tauri-app-macos-x64

          # macOS (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: tauri-app-macos-aarch64

          # Linux (x64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tauri-app-linux-x64

          # （可选）Linux ARM64 交叉编译
          # - os: ubuntu-latest
          #   target: aarch64-unknown-linux-gnu
          #   artifact_name: tauri-app-linux-aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- Rust 环境 ----------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ---------- Linux 系统依赖 ----------
      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          # 如需交叉编译 aarch64，取消下面注释
          # if: matrix.target == 'aarch64-unknown-linux-gnu'
          # sudo apt install -y gcc-aarch64-linux-gnu
          # export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc

      # ---------- 安装 tauri-cli ----------
      - name: Install tauri-cli
        run: cargo install tauri-cli

      # ---------- 构建 Tauri 应用 ----------
      - name: Build Tauri app
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          # 如果需要签名，可在此设置对应环境变量（macOS / Windows）
          # TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # 等
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- 上传构建产物（Artifacts） ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle
          # 该目录包含所有安装包（.msi, .dmg, .AppImage, .deb 等）
          # 会自动打包成 zip 供下载

  # ==========================
  # 发布任务（仅当推送 v 标签时触发）
  # ==========================
  release:
    name: Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build                 # 等待所有构建完成
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts        # 下载到 artifacts 目录，每个 artifact 以子目录存放

      - name: List downloaded files (debug)
        run: ls -R artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}          # Release 标题（如 v1.0.0）
          draft: false
          prerelease: false
          files: artifacts/**/*                 # 上传所有文件（保留子目录结构）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
